name: Workflow saludo

on:
  workflow_dispatch:
    inputs:
      nombre_apellidos:
        description: 'Tu nombre y apellidos'
        required: true
        default: 'Alumno'

jobs:
  saludo:
    runs-on: ubuntu-latest
    steps:
      - name: Imprimir nombre y apellidos
        run: echo "Nombre y apellidos: ${{ github.event.inputs.nombre_apellidos }}"